# .pre-commit-config.yaml
repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: check-yaml
    -   id: check-toml
    -   id: end-of-file-fixer
    -   id: trailing-whitespace

-   repo: local
    hooks:
    -   id: ruff
        name: ruff
        entry: uv run --extra dev ruff check --fix --exit-non-zero-on-fix
        language: system
        types_or: [python, pyi]
        exclude: ^(utils/windows_native_scan\.c|utils/windows_native_scan/)
    -   id: ruff-format
        name: ruff-format
        entry: uv run --extra dev ruff format
        language: system
        types_or: [python, pyi]
        exclude: ^(utils/windows_native_scan\.c|utils/windows_native_scan/)
    -   id: clang-format
        name: clang-format
        entry: uvx clang-format --dry-run --Werror
        language: system
        files: ^utils/windows_native_scan/.*\.(c|h)$
    -   id: cppcheck
        name: cppcheck
        entry: uvx cppcheck --enable=warning,performance,portability --check-level=exhaustive --error-exitcode=1 --quiet --inline-suppr --language=c --std=c11 utils/windows_native_scan
        language: system
        pass_filenames: false
        files: ^utils/windows_native_scan/.*\.(c|h)$
    -   id: windows-native-compile
        name: windows-native-compile
        entry: uv run python utils/windows_native_compile_hook.py
        language: system
        pass_filenames: false
        files: ^utils/windows_native_scan/.*\.(c|h)$
    -   id: mypy
        name: mypy
        entry: uv run --extra dev python -m mypy --config-file=pyproject.toml src tests
        language: system
        pass_filenames: false
    -   id: bump-project-version
        name: versioning
        entry: uv run python utils/project_version.py bump-if-needed
        language: system
        pass_filenames: false
        always_run: true
    -   id: pytest
        name: pytest
        entry: uv run --extra dev python -m pytest
        language: system
        types: [python]
        pass_filenames: false
